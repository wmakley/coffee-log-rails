inherit_mode:
  merge:
    - Exclude

require:
  - ./lib/rubocop/cop/lint_env
  - standard

plugins:
  - standard-custom
  - standard-performance
  - rubocop-performance
  - rubocop-rails
  - rubocop-minitest

inherit_gem:
  standard: config/base.yml
  # You can also choose a Ruby-version-specific config
  # standard: config/ruby-3.0.yml
  # Standard plugins must be loaded separately (since v1.28.0)
  standard-performance: config/base.yml
  standard-custom: config/base.yml
  standard-rails: config/base.yml

inherit_from:
  - .rubocop_todo.yml
  - .rubocop_strict.yml

AllCops:
  SuggestExtensions: false
  TargetRubyVersion: 3.4
  NewCops: enable
  Exclude:
    - "db/migrate/*.active_storage.rb"
    - "db/migrate/*_create_versions.rb"

Lint/Env:
  Enabled: false # crashing
  Include:
    - "**/*.rb"
  Exclude:
    - "**/config/environments/**/*"
    - "**/config/application.rb"
    - "**/config/environment.rb"
    - "**/config/initializers/*.rb"
    - "**/config/puma.rb"
    - "**/config/boot.rb"
    - "**/spec/*_helper.rb"
    - "**/spec/**/support/**/*"
    - "lib/generators/**/*"

Rails/Output:
  Exclude:
    - "db/**/*"

Minitest/MultipleAssertions:
  Enabled: false

Rails/FindEach:
  Enabled: false # just not that useful / kind of obvious, and there are many cases where find_each cannot be used

Style/GlobalStdStream:
  Exclude:
    - 'config/environments/*.rb'

Style/TrailingCommaInArguments:
  EnforcedStyleForMultiline: comma

Style/TrailingCommaInArrayLiteral:
  EnforcedStyleForMultiline: comma

Style/TrailingCommaInHashLiteral:
  EnforcedStyleForMultiline: comma
